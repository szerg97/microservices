server:
  port: 7082

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    username: 'root'
    password: 'root'
    url: 'jdbc:postgresql://localhost:5433/test_db'
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQL81Dialect
